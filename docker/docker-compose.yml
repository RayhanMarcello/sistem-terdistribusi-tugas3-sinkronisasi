# =============================================================
# Docker Compose - Distributed Sync System
# =============================================================
# Services:
#   Core:       node1, node2, node3 (lock + cache + queue)
#   Queue:      kafka, zookeeper
#   State:      redis
#   Database:   mysql (port 3306 exposed externally)
#   API:        api (FastAPI + Swagger at :8000)
#   Monitoring: prometheus (:9090), grafana (:3000)
#   Geo Bonus:  geo-node-us, geo-node-eu, geo-node-asia
# =============================================================

version: "3.9"

# -----------------------------------------------
# Shared volumes
# -----------------------------------------------
volumes:
  mysql_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  prometheus_data:
  grafana_data:
  certs_data:       # Shared TLS certs across nodes
  models_data:      # ML model persistence

# -----------------------------------------------
# Overlay networks
# -----------------------------------------------
networks:
  cluster_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  geo_us_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
  geo_eu_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
  geo_asia_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16
  monitoring_net:
    driver: bridge

# -----------------------------------------------
# Service Defaults
# -----------------------------------------------
x-node-defaults: &node-defaults
  build:
    context: ..
    dockerfile: docker/Dockerfile.node
  env_file: ../.env
  volumes:
    - certs_data:/app/certs
    - models_data:/app/models
  networks:
    - cluster_net
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_started
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

# -----------------------------------------------
# Services
# -----------------------------------------------
services:

  # =============================================
  # Infrastructure: MySQL
  # =============================================
  mysql:
    image: mysql:8.0
    container_name: dist-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-distributed_sync}
      MYSQL_USER: ${MYSQL_USER:-distuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-distpass123}
    ports:
      - "3307:3306"   # 3307 to avoid conflict with local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
      - ../scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --bind-address=0.0.0.0
      --max-connections=500
      --innodb-buffer-pool-size=256M
    networks:
      - cluster_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # =============================================
  # Infrastructure: Redis
  # =============================================
  redis:
    image: redis:7.2-alpine
    container_name: dist-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispass123}
      --appendonly yes
      --appendfilename appendonly.aof
      --save 60 1
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cluster_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================
  # Infrastructure: ZooKeeper (for Kafka)
  # =============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: dist-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - cluster_net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================
  # Infrastructure: Kafka
  # =============================================
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: dist-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_LOG4J_LOGGERS: "kafka=WARN,kafka.controller=WARN,kafka.log.LogCleaner=WARN,state.change.logger=WARN,kafka.producer.async.DefaultEventHandler=WARN"
    ports:
      - "29093:29092"  # External access (29093 to avoid conflicts)
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - cluster_net
    restart: unless-stopped

  # =============================================
  # Core Nodes (3 nodes minimum)
  # =============================================
  node1:
    <<: *node-defaults
    container_name: dist-node1
    hostname: node1
    environment:
      NODE_ID: node1
      NODE_HOST: 0.0.0.0
      GRPC_PORT: 50051
      METRICS_PORT: 9101
      CLUSTER_NODES: node1:node1:50051,node2:node2:50051,node3:node3:50051
      GEO_REGION: us
    ports:
      - "50051:50051"
      - "9101:9101"
    networks:
      - cluster_net
      - geo_us_net

  node2:
    <<: *node-defaults
    container_name: dist-node2
    hostname: node2
    environment:
      NODE_ID: node2
      NODE_HOST: 0.0.0.0
      GRPC_PORT: 50051
      METRICS_PORT: 9102
      CLUSTER_NODES: node1:node1:50051,node2:node2:50051,node3:node3:50051
      GEO_REGION: eu
    ports:
      - "50052:50051"
      - "9102:9102"
    networks:
      - cluster_net
      - geo_eu_net

  node3:
    <<: *node-defaults
    container_name: dist-node3
    hostname: node3
    environment:
      NODE_ID: node3
      NODE_HOST: 0.0.0.0
      GRPC_PORT: 50051
      METRICS_PORT: 9103
      CLUSTER_NODES: node1:node1:50051,node2:node2:50051,node3:node3:50051
      GEO_REGION: asia
    ports:
      - "50053:50051"
      - "9103:9103"
    networks:
      - cluster_net
      - geo_asia_net

  # =============================================
  # Geo-Distributed Nodes (Bonus B)
  # =============================================
  geo-node-us:
    <<: *node-defaults
    container_name: dist-geo-us
    hostname: geo-node-us
    environment:
      NODE_ID: geo-node-us
      NODE_HOST: 0.0.0.0
      GRPC_PORT: 50051
      METRICS_PORT: 9111
      CLUSTER_NODES: geo-node-us:geo-node-us:50051,geo-node-eu:geo-node-eu:50051,geo-node-asia:geo-node-asia:50051
      GEO_REGION: us
      IS_GEO_NODE: "true"
    ports:
      - "50061:50051"
      - "9111:9111"
    networks:
      - geo_us_net
      - cluster_net

  geo-node-eu:
    <<: *node-defaults
    container_name: dist-geo-eu
    hostname: geo-node-eu
    environment:
      NODE_ID: geo-node-eu
      NODE_HOST: 0.0.0.0
      GRPC_PORT: 50051
      METRICS_PORT: 9112
      CLUSTER_NODES: geo-node-us:geo-node-us:50051,geo-node-eu:geo-node-eu:50051,geo-node-asia:geo-node-asia:50051
      GEO_REGION: eu
      IS_GEO_NODE: "true"
    ports:
      - "50062:50051"
      - "9112:9112"
    networks:
      - geo_eu_net
      - cluster_net

  geo-node-asia:
    <<: *node-defaults
    container_name: dist-geo-asia
    hostname: geo-node-asia
    environment:
      NODE_ID: geo-node-asia
      NODE_HOST: 0.0.0.0
      GRPC_PORT: 50051
      METRICS_PORT: 9113
      CLUSTER_NODES: geo-node-us:geo-node-us:50051,geo-node-eu:geo-node-eu:50051,geo-node-asia:geo-node-asia:50051
      GEO_REGION: asia
      IS_GEO_NODE: "true"
    ports:
      - "50063:50051"
      - "9113:9113"
    networks:
      - geo_asia_net
      - cluster_net

  # =============================================
  # REST API + Swagger UI
  # =============================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: dist-api
    env_file: ../.env
    environment:
      CLUSTER_NODES: node1:node1:50051,node2:node2:50051,node3:node3:50051
      REST_PORT: 8000
    ports:
      - "8000:8000"   # Swagger UI at http://localhost:8000/docs
    volumes:
      - certs_data:/app/certs:ro
    networks:
      - cluster_net
    depends_on:
      - node1
      - node2
      - node3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # =============================================
  # Monitoring: Prometheus
  # =============================================
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: dist-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - cluster_net
      - monitoring_net
    restart: unless-stopped

  # =============================================
  # Monitoring: Grafana
  # =============================================
  grafana:
    image: grafana/grafana:10.4.3
    container_name: dist-grafana
    environment:
      # Anonymous access (as requested)
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"   # Grafana UI
    networks:
      - monitoring_net
      - cluster_net
    depends_on:
      - prometheus
    restart: unless-stopped
