global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'distributed-nodes'
    static_configs:
      - targets:
          - 'node1:9091'
          - 'node2:9091'
          - 'node3:9091'
          - 'geo-node-eu:9091'
          - 'geo-node-asia:9091'

  - job_name: 'api-gateway'
    static_configs:
      - targets:
          - 'api-gateway:8000'
